<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DDM GAT STORE</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">🐱 DDM <span>GAT STORE</span></div>
            <div class="vendedor-tag">Vendedor: Melany Del Castillo</div>
        </header>

        <div th:if="${mensaje}" class="status-msg" th:text="${mensaje}"></div>

        <main class="content">
            <section class="card form-box">
                <h2>📝 Registro de Venta</h2>
                <form th:action="@{/calcular}" th:object="${producto}" method="post">
                    <div class="input-group">
                        <label>Nombre del Cliente</label>
                        <input type="text" th:field="*{cliente}" placeholder="Cliente completo" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Seleccionar Accesorio 🐱</label>
                        <select th:field="*{nombre}" class="custom-select" required>
                            <option value="" disabled selected>Seleccione un producto...</option>
                            <option th:each="p : ${catalogo}" th:value="${p.key}" th:text="${p.key} + ' (S/ ' + ${p.value} + ')'"></option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Modalidad de Venta</label>
                        <div class="radio-options">
                            <label class="radio-label">
                                <input type="radio" th:field="*{tipoVenta}" value="Menor" checked> Unidad
                            </label>
                            <label class="radio-label">
                                <input type="radio" th:field="*{tipoVenta}" value="Mayor"> Al por Mayor (-20%)
                            </label>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Cantidad</label>
                        <input type="number" th:field="*{cantidad}" min="1" required>
                    </div>

                    <button type="submit" class="btn-shine">PROCESAR PEDIDO</button>
                </form>
            </section>

            <section class="card result-box">
                <h2>📊 Resumen de Operación</h2>
                <div th:if="${total != null}" class="invoice">
                    <div class="invoice-item">
                        <span>Cliente:</span>
                        <strong th:text="${producto.cliente}"></strong>
                    </div>
                    <div class="invoice-item">
                        <span>Producto:</span>
                        <strong th:text="${producto.nombre}"></strong>
                    </div>
                    <div class="invoice-item">
                        <span>Modalidad:</span>
                        <strong th:text="${producto.tipoVenta}"></strong>
                    </div>
                    <div class="invoice-item">
                        <span>Precio Unit.:</span>
                        <strong th:text="'S/ ' + ${#numbers.formatDecimal(precioUnitario, 1, 2)}"></strong>
                    </div>
                    <div class="invoice-item">
                        <span>Cantidad:</span>
                        <strong th:text="${producto.cantidad}"></strong>
                    </div>
                    <div class="total-bar">
                        <span>TOTAL A PAGAR</span>
                        <h3 th:text="'S/ ' + ${#numbers.formatDecimal(total, 1, 2)}"></h3>
                    </div>
                </div>
                <div th:unless="${total != null}" class="empty-state">
                    <p>Esperando datos de entrada...</p>
                </div>
            </section>
        </main>

        <footer>
            © 2026 DDM - Sistema de Gestión de Ventas Especializadas
        </footer>
    </div>
</body>
</html>
