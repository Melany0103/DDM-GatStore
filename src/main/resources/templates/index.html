<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DDM GAT STORE | Boutique</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="top-nav">
        <div class="logo">🐾 DDM <span>GAT STORE</span></div>
        <a th:href="@{/admin}" class="btn-to-admin">⚙️ Acceso Administrador</a>
    </nav>

    <header class="hero">
        <h1>Lo mejor para tu michi 🐈</h1>
        <p>Boutique especializada en accesorios de alta gama.</p>
    </header>

    <main class="main-container">
        <div th:if="${param.success}" class="alert-success">✅ ¡Venta registrada exitosamente!</div>
        
        <form th:action="@{/vender}" th:object="${producto}" method="post" class="form-card">
            <h3>🛒 Nuevo Pedido</h3>
            
            <div class="input-group">
                <label>Nombre del Cliente</label>
                <input type="text" th:field="*{cliente}" placeholder="Nombre completo" required>
            </div>

            <div class="input-group">
                <label>Categoría y Producto</label>
                <select name="prodInfo" required>
                    <option value="" disabled selected>Seleccione un accesorio...</option>
                    <optgroup th:each="cat : ${categorias}" th:label="${cat.key}">
                        <option th:each="p : ${cat.value}" 
                                th:value="${p.key + ':' + p.value}" 
                                th:text="${p.key + ' - S/ ' + p.value}">
                        </option>
                    </optgroup>
                </select>
            </div>

            <div class="grid-form">
                <div class="input-group">
                    <label>Cantidad</label>
                    <input type="number" th:field="*{cantidad}" min="1" value="1" required>
                </div>
                <div class="input-group">
                    <label>Tipo de Venta</label>
                    <select th:field="*{tipoVenta}">
                        <option value="Menor">Unidad</option>
                        <option value="Mayor">Mayorista (-20%)</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-submit">FINALIZAR COMPRA</button>
        </form>
    </main>
</body>
</html>
